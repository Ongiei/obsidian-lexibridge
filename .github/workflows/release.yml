name: Release

on:
    workflow_dispatch:
        inputs:
            version:
                description: Release version matching manifest.json, without a leading v
                required: true
                type: string

permissions:
    contents: write
    id-token: write
    attestations: write
    artifact-metadata: write

jobs:
    release:
        if: github.ref == 'refs/heads/main'
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: 24.x
                  cache: npm
            - name: Verify requested version
              run: |
                  actual_version="$(node -p "require('./manifest.json').version")"
                  test "${{ inputs.version }}" = "$actual_version"
            - run: npm ci
            - run: npm test
            - run: npm run lint
            - run: npm run check:community
            - name: Attest release assets
              uses: actions/attest@v4
              with:
                  subject-path: |
                      dist/main.js
                      dist/manifest.json
                      dist/styles.css
            - name: Publish GitHub release
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  if gh release view "${{ inputs.version }}" >/dev/null 2>&1; then
                      gh release upload "${{ inputs.version }}" \
                          dist/main.js \
                          dist/manifest.json \
                          dist/styles.css \
                          --clobber
                      gh release edit "${{ inputs.version }}" \
                          --title "${{ inputs.version }}" \
                          --latest
                  else
                      gh release create "${{ inputs.version }}" \
                          dist/main.js \
                          dist/manifest.json \
                          dist/styles.css \
                          --title "${{ inputs.version }}" \
                          --generate-notes
                  fi
